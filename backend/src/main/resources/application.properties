server.port=9090

spring.datasource.url=${LIB_DB_URL:jdbc:postgresql://localhost:5432/library}
spring.datasource.username=${LIB_DB_USER:postgres}
spring.datasource.password=${LIB_DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=public

spring.jpa.open-in-view=false
spring.jpa.show-sql=false

